# Project information
site_name: Guide utilisateur CollectiveAccess
site_description: 'Documentation pour les utilisateurs de CollectiveAccess avec le plugin Musées De France'
site_author: 'idéesculture'

nav:
- Accueil: index.md
- Utilisation de CollectiveAccess :
    - I. Connexion et démarrage dans Providence: chapterXI_connexion_demarrage.md
    - II. Recherche: chapterII_recherche.md
    - III. Effectuer un traitement par lots: chapterIII_traitements_lots.md
    - IV. Paramétrage des grilles de saisie: chapterIX_parametrage_grille_saisie.md
    - V. Paramétrage des listes de vocabulaire: chapterX_Parametrage_listes_vocabulaire.md
    - VI. Ajouter un objet 3D dans Providence (avec Sketchfab): chapterIV_objet_modelise.md
    - VII. Importer des médias en lot: chapterVIII_Import_medias_lot.md
    - VIII. Utiliser Grav comme CMS à côté de CollectiveAccess : chapterVII_configuration_site_internet.md
- Saisie Joconde :
    - Introduction : Decrire_Objets_Joconde.md 
    - I. Présentation de la saisie Joconde: Introduction.md
    - II. Objets: Saisie_Joconde.md
    - III. Entités: Saisie_Entite.md
    - IV. Lieux: Saisie_Lieux.md
    - V. Récolement: Recolement.md
    - VI. Export Joconde: Export_Joconde.md
    - VII. Registre des biens affectés/déposés: Registre_biens.md
- Plugin Articles pour Pawtucket :
    - Introduction: articles_introduction.md
    - I. Créer un article et ses propriétés: articles_creation.md
    - II. Rédiger avec l'éditeur de blocs: articles_editeur.md
    - III. Les blocs CollectiveAccess: articles_blocs_ca.md
    - IV. Publier et historique des versions: articles_publication.md
- Génération de cette documentation :
    - Logiciels utilisés: tech_logiciels.md
    - Installation: tech_install.md
    - Crédits: credits.md

# Repository
repo_name: 'GitHub'
repo_url: 'http://github.com/ideesculture/museesDeFranceDocumentation'

theme:
  name: material
  custom_dir: overrides  
  language: fr
  palette:
    primary: orange
  logo: 'images/logo.png'
  extra:
    generator: false
    version: '1.0'
    author:
      github: 'ideesculture'
      twitter: 'ideesculture'
    faq:
      url: 'https://ideesculture.zendesk.com/hc/fr'
    
  copyright: 2021 IdéesCulture


# Extensions
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - footnotes
  - toc:
      permalink: '¶'


# Analyse visiteurs
extra:
  analytics:
    provider: google
    property: G-NKYNH7SBB4
    feedback:
      title: Cette page vous a-t-elle été utile ?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Oui
          data: 1
          note: Merci pour votre retour !
        - icon: material/emoticon-sad-outline
          name: Non
          data: 0
          note: Aidez-nous à améliorer cette page — décrivez ce qui manque sur GitHub.
