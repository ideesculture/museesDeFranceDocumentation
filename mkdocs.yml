# Repository
repo_name: 'GitHub'
repo_url: 'http://github.com/ideesculture/museesDeFranceDocumentation'

theme:
  name: material
  custom_dir: overrides  
  language: fr
  palette:
    primary: orange
  logo: 'images/logo.png'
  extra:
    generator: false
    version: '1.0'
    author:
      github: 'ideesculture'
      twitter: 'ideesculture'
    faq:
      url: 'https://ideesculture.zendesk.com/hc/fr'
    
  copyright: 2021 IdéesCulture


# Extensions
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - footnotes
  - toc:
      permalink: '¶'

